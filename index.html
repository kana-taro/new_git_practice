<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="app.css">
    <title>Document</title>
</head>
<body>
    <header>
        <h1>かなたろのプロフィールサイト</h1>
        <nav>
            <a href="#about">About</a>
            <a href="#works">Works</a>
            <a href="#contact">Contact</a>
        </nav>
    </header>
    <main>
        <section id="about">
            <h2>About</h2>
            <p>エンジニア転職を目指してプログラミングの学習をしています。</p>
        </section>
        <section id="works">
            <h2>Works</h2>
            <p>これから作った作品をここに載せていきます。</p>
        </section>
        <section id="contact">
            <h2>Contact</h2>
            <form>
                <label>名前：</label>
                <input type="text" placeholder="お名前を入力してください">

                <label>メールアドレス：</label>
                <input type="email" placeholder="example@example.com">

                <label>メッセージ：</label>
                <textarea placeholder="お問い合わせ内容を入力してください"></textarea>
                
                <button type="submit">送信</button>
            </form>
        </section>
    </main> 
</body>
</html>
